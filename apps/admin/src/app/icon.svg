<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024" width="1024" height="1024">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1D4ED8"/>
      <stop offset="55%" stop-color="#0EA5E9"/>
      <stop offset="100%" stop-color="#38BDF8"/>
    </linearGradient>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="14"/>
      <feOffset dx="0" dy="10" result="offsetblur"/>
      <feComponentTransfer>
        <feFuncA type="linear" slope="0.35"/>
      </feComponentTransfer>
      <feMerge>
        <feMergeNode/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background: rounded square with blue gradient -->
  <rect width="1024" height="1024" rx="224" fill="url(#bg)"/>

  <!--
    Heart-arrow mark.
    Two heart lobes on top, a stretched arrow-like tail on the bottom,
    so the silhouette doubles as a navigation pin pointing down-forward.
    Drawn at center (512, 512).
  -->
  <g filter="url(#soft)">
    <!-- Heart with elongated, sharp tail (arrow-like) -->
    <path
      d="M512 820
         C 380 720, 280 620, 240 500
         C 215 420, 240 330, 320 305
         C 388 285, 460 320, 512 390
         C 564 320, 636 285, 704 305
         C 784 330, 809 420, 784 500
         C 744 620, 644 720, 512 820 Z"
      fill="#FFFFFF"/>

    <!-- Inner directional arrow (subtle, sits inside the heart) -->
    <path
      d="M512 470
         L 460 540
         L 488 540
         L 488 620
         L 536 620
         L 536 540
         L 564 540 Z"
      fill="url(#bg)"/>
  </g>
</svg>
