# Netlify deploy config for the SmartStat AI admin dashboard.
#
# Set this repo on Netlify with "Base directory" left empty (the build runs
# from the repo root so the pnpm workspace can resolve @smartstat/shared).
#
# Required environment variables (set in Netlify UI → Site → Configuration
# → Environment variables):
#   NEXT_PUBLIC_SUPABASE_URL
#   NEXT_PUBLIC_SUPABASE_ANON_KEY
#
# When Vercel access arrives, this file can be deleted — vercel.json takes
# over and the repo deploys identically there.

[build]
  base = ""
  # We bypass corepack — Netlify's corepack has a stale signing key for
  # pnpm 11.x ("Cannot find matching keyid") on Node 22.13. Installing
  # pnpm via npm directly works reliably.
  command = "npm install -g pnpm@11.1.3 && pnpm install --frozen-lockfile && pnpm --filter @smartstat/admin build"
  publish = "apps/admin/.next"
  ignore = "/bin/false"

[build.environment]
  # pnpm 11.x requires Node 22.13+ (uses node:sqlite built-in).
  # If we drop below 22 the install crashes with ERR_UNKNOWN_BUILTIN_MODULE.
  NODE_VERSION = "22.13.0"
  NEXT_TELEMETRY_DISABLED = "1"
  # Skip Netlify's own corepack-based pnpm detection — we install pnpm in
  # the build command above. Without this, Netlify still tries corepack
  # FIRST during the "Installing dependencies" stage and the deploy dies
  # before our command can run.
  NETLIFY_USE_PNPM = "false"
  # Same effect, different env var Netlify also honours
  COREPACK_ENABLE_AUTO_PIN = "0"

# Tell Netlify which Next.js app to use (it auto-detects but we're explicit
# because we're in a monorepo).
[[plugins]]
  package = "@netlify/plugin-nextjs"

# Headers (security + performance)
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Permissions-Policy = "camera=(self), microphone=(), geolocation=()"

[[headers]]
  for = "/_next/static/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"
