# Netlify deploy config for the SmartStat AI admin dashboard.
#
# Monorepo layout: the Next.js app is at apps/admin/. We set `base` to
# that subdirectory so Netlify's OpenNext-based Next.js adapter
# auto-detects the framework, provisions the SSR function + edge
# middleware, and generates the right redirects.
#
# Note: with `base = "apps/admin"`, all commands run from that dir.
# pnpm walks up to find pnpm-workspace.yaml at the repo root, so the
# workspace dependency on @smartstat/shared still resolves correctly.
#
# Required environment variables (set in Netlify UI → Site →
# Configuration → Environment variables):
#   NEXT_PUBLIC_SUPABASE_URL
#   NEXT_PUBLIC_SUPABASE_ANON_KEY
#   RESEND_API_KEY (optional — falls back to dev-stub if missing)
#   RESEND_FROM_ADDRESS, RESEND_FROM_NAME

[build]
  base = "apps/admin"
  # Both command and publish are REQUIRED — the adapter does not
  # auto-derive them when base is a subdir. Without `publish` set,
  # Netlify defaults publish=base and uploads the raw source dir.
  # Paths are relative to `base` (i.e. apps/admin/).
  command = "pnpm build"
  publish = ".next"

[build.environment]
  # pnpm 11.x requires Node 22.13+ (uses node:sqlite built-in).
  NODE_VERSION = "22.13.0"
  NEXT_TELEMETRY_DISABLED = "1"

# IMPORTANT: do NOT add a [[plugins]] entry for @netlify/plugin-nextjs.
# Per Netlify docs (https://docs.netlify.com/build/frameworks/framework-setup-guides/nextjs/):
# "We recommend that you don't pin the adapter version. We actively
# maintain the adapter ... if you don't pin the version, we will
# automatically use the latest version on each project build for you."
# Pinning via [[plugins]] loads an older bundled copy (v4.x) that
# can't bundle Next.js 16 middleware.

# Headers (security + performance)
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Permissions-Policy = "camera=(self), microphone=(), geolocation=()"

[[headers]]
  for = "/_next/static/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"
