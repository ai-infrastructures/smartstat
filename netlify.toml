# Netlify deploy config for the SmartStat AI admin dashboard.
#
# Set this repo on Netlify with "Base directory" left empty (the build runs
# from the repo root so the pnpm workspace can resolve @smartstat/shared).
#
# Required environment variables (set in Netlify UI → Site → Configuration
# → Environment variables):
#   NEXT_PUBLIC_SUPABASE_URL
#   NEXT_PUBLIC_SUPABASE_ANON_KEY
#
# When Vercel access arrives, this file can be deleted — vercel.json takes
# over and the repo deploys identically there.

[build]
  base = ""
  # Netlify's "Installing dependencies" step already runs `pnpm install`
  # via Corepack (pnpm 10.30.3) — so all we need to do here is run the
  # actual build. Don't reinstall pnpm: it's already on PATH and `npm i -g`
  # fails with EEXIST.
  command = "pnpm --filter @smartstat/admin build"
  publish = "apps/admin/.next"
  ignore = "/bin/false"

[build.environment]
  # pnpm 11.x requires Node 22.13+ (uses node:sqlite built-in). Even though
  # Corepack on Netlify currently activates pnpm 10.x, the lockfile is
  # compatible and Node 22.13 is still required by other tooling.
  NODE_VERSION = "22.13.0"
  NEXT_TELEMETRY_DISABLED = "1"

# NOTE: we intentionally do NOT declare @netlify/plugin-nextjs here.
# When pinned via netlify.toml Netlify installs an old bundled copy
# (4.41.6) that can't resolve @opentelemetry/api from Next.js 16's
# Edge Functions. Letting Netlify auto-detect via the UI uses the
# current version (5.x) which works.
# If the plugin isn't already installed on this site, add it once via:
#   Netlify UI → Site → Plugins → Install "Next.js"

# Headers (security + performance)
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Permissions-Policy = "camera=(self), microphone=(), geolocation=()"

[[headers]]
  for = "/_next/static/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"
